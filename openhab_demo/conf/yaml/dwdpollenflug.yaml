version: 1
things:
  dwdpollenflug:bridge:dwd:
    isBridge: true
  dwdpollenflug:region:dwd:berlin:
    bridge: dwdpollenflug:bridge:dwd
    label: DWD Pollen Count Index Berlin
    config:
      regionID: 50

items:
  gPollen_Count:
    type: Group
    label: Pollen Count
    tags:
      - WeatherService
  Pollen_Count_Birch:
    type: String
    label: Birch
    icon: garden
    groups:
      - gPollen_Count
    tags:
      - Measurement
    channel: dwdpollenflug:region:dwd:berlin:birch#today
    metadata:
      stateDescription:
        value: ''
        config:
          pattern: MAP(pollencount.map):%s
  Pollen_Count_Grasses:
    type: String
    label: Grasses
    icon: lawnmower
    groups:
      - gPollen_Count
    tags:
      - Measurement
    channel: dwdpollenflug:region:dwd:berlin:grasses#today
    metadata:
      stateDescription:
        value: ''
        config:
          pattern: MAP(pollencount.map):%s
