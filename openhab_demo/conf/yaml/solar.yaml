version: 1
items:
  gSolar:
    type: Group
    label: Solar Inverter
    tags:
      - Inverter
  # Use actual values from ForecastSolar along with some randomness to fake power values:
  Solar_Power_Total:
    type: Group
    group:
      type: Number
      dimension: Power
      function: SUM
    label: Total Power
    icon: solarplant
    format: '%.2f kW'
    unit: kW
    groups:
      - gSolar
    tags:
      - Measurement
      - Power
  Solar_Power_East:
    type: Number
    dimension: Power
    label: Plane East Power
    icon: solarplant
    format: '%.2f kW'
    unit: kW
    groups:
      - gSolar
      - Solar_Power_Total
      - EMS_Solar_Power
    tags:
      - Measurement
      - Power
    channels:
      solarforecast:fs-plane:local:east:power-actual:
        profile: transform:JS
        toItemScript: randomness.js?scale=0.2&min=0
  Solar_Power_West:
    type: Number
    dimension: Power
    label: Plane West Power
    icon: solarplant
    format: '%.2f kW'
    unit: kW
    groups:
      - gSolar
      - Solar_Power_Total
      - EMS_Solar_Power
    tags:
      - Measurement
      - Power
    channels:
      solarforecast:fs-plane:local:west:power-actual:
        profile: transform:JS
        toItemScript: randomness.js?scale=0.2&min=0
  # Calculated values:
  Solar_Production_Day:
    type: Number
    dimension: Energy
    label: Daily Production
    icon: solarplant
    format: '%.2f %unit%'
    unit: kWh
    groups:
      - gSolar
    tags:
      - Measurement
      - Energy
  Solar_Production_Month:
    type: Number
    dimension: Energy
    label: Monthly Production
    icon: solarplant
    format: '%.2f %unit%'
    unit: kWh
    groups:
      - gSolar
    tags:
      - Measurement
      - Energy
