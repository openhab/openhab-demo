version: 1

tags:
  Equipment_EnergyManagementSystem:
    label: EMS
    description: The equipment representing an energy management system.
    synonyms:
      - Energy Management System

items:
  gEMS:
    type: group
    label: Energy Management System
    icon: energy
    tags:
      - EnergyManagementSystem
  # Random power values:
  EMS_Load_Power:
    type: Number
    dimension: Power
    label: Load Power
    icon: iconify:lucide:house
    format: '%.0f W'
    unit: kW
    groups:
      - gEMS
    tags:
      - Measurement
      - Power
  # Summarised from solar plants:
  EMS_Solar_Power:
    type: Group
    group:
      type: Number
      dimension: Power
      function: SUM
    label: Solar Power
    icon: iconify:material-symbols-light:solar-power-rounded
    format: '%.0f W'
    unit: kW
    groups:
      - gEMS
    tags:
      - Measurement
      - Power
  # Calculated power values:
  EMS_Grid_Power:
    type: Number
    dimension: Power
    label: Grid Power
    icon: iconify:lucide:utility-pole
    format: '%.0f W'
    unit: kW
    groups:
      - gEMS
    tags:
      - Measurement
      - Power
  EMS_Battery_Power:
    type: Number
    dimension: Power
    label: Battery Power
    icon: iconify:lucide:battery-charging
    format: '%.0f W'
    unit: kW
    groups:
      - gEMS
    tags:
      - Measurement
      - Power
  # Calculated SoC values:
  EMS_Battery_SoC:
    type: Number
    dimension: Dimensionless
    label: Battery SoC
    icon: iconify:lucide:battery-charging
    format: '%d %unit%'
    unit: '%'
    groups:
      - gEMS
    tags:
      - Status
      - Energy
  # Calculated energy values:
  EMS_TotalConsumption_Day:
    type: Number
    dimension: Energy
    label: Daily Consumption
    icon: iconify:lucide:house
    format: '%.2f %unit%'
    unit: kWh
    groups:
      - gEMS
    tags:
      - Measurement
      - Energy
  EMS_TotalConsumption_Month:
    type: Number
    dimension: Energy
    label: Monthly Consumption
    icon: iconify:lucide:house
    format: '%.2f %unit%'
    unit: kWh
    groups:
      - gEMS
    tags:
      - Measurement
      - Energy
  EMS_SelfConsumption_Day:
    type: Number
    dimension: Energy
    label: Daily Self-Consumption
    icon: iconify:lucide:house
    format: '%.2f %unit%'
    unit: kWh
    groups:
      - gEMS
    tags:
      - Measurement
      - Energy
  EMS_SelfConsumption_Month:
    type: Number
    dimension: Energy
    label: Monthly Self-Consumption
    icon: iconify:lucide:house
    format: '%.2f %unit%'
    unit: kWh
    groups:
      - gEMS
    tags:
      - Measurement
      - Energy
  EMS_GridConsumption_Day:
    type: Number
    dimension: Energy
    label: Daily Grid Consumption
    icon: iconify:lucide:utility-pole
    format: '%.2f %unit%'
    unit: kWh
    groups:
      - gEMS
    tags:
      - Measurement
      - Energy
  EMS_GridConsumption_Month:
    type: Number
    dimension: Energy
    label: Monthly Grid Consumption
    icon: iconify:lucide:utility-pole
    format: '%.2f %unit%'
    unit: kWh
    groups:
      - gEMS
    tags:
      - Measurement
      - Energy
  EMS_FeedIn_Day:
    type: Number
    dimension: Energy
    label: Daily Grid Feed-In
    icon: iconify:lucide:utility-pole
    format: '%.2f %unit%'
    unit: kWh
    groups:
      - gEMS
    tags:
      - Measurement
      - Energy
  EMS_FeedIn_Month:
    type: Number
    dimension: Energy
    label: Monthly Grid Feed-In
    icon: iconify:lucide:utility-pole
    format: '%.2f %unit%'
    unit: kWh
    groups:
      - gEMS
    tags:
      - Measurement
      - Energy
