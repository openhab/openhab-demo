    label: Battery Power
    format: '%.0f W'
    unit: kW
    groups:
      - gEMS
    tags:
      - Measurement
      - Power
  EMS_Grid_Power:
    type: Number
    dimension: Power
    label: Grid Power
    format: '%.0f W'
    unit: kW
    groups:
      - gEMS
    tags:
      - Measurement
      - Power
