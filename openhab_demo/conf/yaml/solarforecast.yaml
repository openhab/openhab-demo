version: 1
things:
  solarforecast:fs-site:local:
    isBridge: true
    label: ForecastSolar Brandenburger Tor
    config:
      location: "52.516283804703384,13.377661883415065"
      inverterKwp: 15
  solarforecast:fs-plane:local:east:
    bridge: solarforecast:fs-site:local
    label: ForecastSolar Brandenburger Tor Plane East
    config:
      declination: 45
      azimuth: -90
      kwp: 7.5
      dampAM: 0
      dampPM: 0
  solarforecast:fs-plane:local:west:
    bridge: solarforecast:fs-site:local
    label: ForecastSolar Brandenburger Tor Plane West
    config:
      declination: 45
      azimuth: 90
      kwp: 7.5
      dampAM: 0
      dampPM: 0

items:
  # Forecast Items:
  gSolar_Forecast:
    type: Group
    label: ForecastSolar Berlin
    tags:
      - WebService
  Solar_Forecast_Power_Total:
    type: Number
    dimension: Power
    label: Total Power Forecast
    icon: solarplant
    format: '%.2f kW'
    unit: kW
    groups:
      - gSolar_Forecast
    tags:
      - Forecast
      - Power
    channel: solarforecast:fs-site:local:power-estimate
  Solar_Forecast_Power_East:
    type: Number
    dimension: Power
    label: Plane East Power Forecast
    icon: solarplant
    format: '%.2f kW'
    unit: kW
    groups:
      - gSolar_Forecast
    tags:
      - Forecast
      - Power
    channel: solarforecast:fs-plane:local:east:power-estimate
  Solar_Forecast_Power_West:
    type: Number
    dimension: Power
    label: Plane West Power Forecast
    icon: solarplant
    format: '%.2f kW'
    unit: kW
    groups:
      - gSolar_Forecast
    tags:
      - Forecast
      - Power
    channel: solarforecast:fs-plane:local:west:power-estimate
  Solar_Forecast_Energy_Today:
    type: Number
    dimension: Energy
    label: Todays Energy Forecast
    icon: solarplant
    format: '%.2f %unit%'
    unit: kWh
    groups:
      - gSolar_Forecast
    tags:
      - Forecast
      - Energy
    channel: solarforecast:fs-site:local:energy-today
