version: 1
things:
  solarforecast:fs-site:local:
    isBridge: true
    label: ForecastSolar Brandenburger Tor
    config:
      location: "52.516283,13.377661"
      inverterKwp: 15
  solarforecast:fs-plane:local:east:
    bridge: solarforecast:fs-site:local
    label: ForecastSolar Brandenburger Tor Plane East
    config:
      declination: 45
      azimuth: -90
      kwp: 7.5
      dampAM: 0
      dampPM: 0
  solarforecast:fs-plane:local:west:
    bridge: solarforecast:fs-site:local
    label: ForecastSolar Brandenburger Tor Plane West
    config:
      declination: 45
      azimuth: 90
      kwp: 7.5
      dampAM: 0
      dampPM: 0

items:
  gSolar_Forecast:
    type: Group
    label: ForecastSolar Berlin
    tags:
      - WebService
  gSolar_Forecast_TimeSeries:
    type: Group
  # Future Value Forecast:
  Solar_Forecast_Power_Estimate_Total:
    type: Number
    dimension: Power
    label: Total Power Estimation
    icon: solarplant
    format: '%.2f kW'
    unit: kW
    groups:
      - gSolar_Forecast
      - gSolar_Forecast_TimeSeries
    tags:
      - Forecast
      - Power
    channel: solarforecast:fs-site:local:power-estimate
  Solar_Forecast_Power_Estimate_East:
    type: Number
    dimension: Power
    label: Plane East Power Estimation
    icon: solarplant
    format: '%.2f kW'
    unit: kW
    groups:
      - gSolar_Forecast
      - gSolar_Forecast_TimeSeries
    tags:
      - Forecast
      - Power
    channel: solarforecast:fs-plane:local:east:power-estimate
  Solar_Forecast_Power_Estimate_West:
    type: Number
    dimension: Power
    label: Plane West Power Estimation
    icon: solarplant
    format: '%.2f kW'
    unit: kW
    groups:
      - gSolar_Forecast
      - gSolar_Forecast_TimeSeries
    tags:
      - Forecast
      - Power
    channel: solarforecast:fs-plane:local:west:power-estimate
  # Actual Value Prediction:
  Solar_Forecast_Power_Actual_Total:
    type: Number
    dimension: Power
    label: Total Power Actual
    icon: solarplant
    format: '%.2f kW'
    unit: kW
    groups:
      - gSolar_Forecast
    tags:
      - Forecast
      - Power
    channel: solarforecast:fs-site:local:power-actual
  Solar_Forecast_Power_Actual_East:
    type: Number
    dimension: Power
    label: Plane East Power Actual
    icon: solarplant
    format: '%.2f kW'
    unit: kW
    groups:
      - gSolar_Forecast
    tags:
      - Forecast
      - Power
    channel: solarforecast:fs-plane:local:east:power-actual
  Solar_Forecast_Power_Actual_West:
    type: Number
    dimension: Power
    label: Plane West Power Actual
    icon: solarplant
    format: '%.2f kW'
    unit: kW
    groups:
      - gSolar_Forecast
    tags:
      - Forecast
      - Power
    channel: solarforecast:fs-plane:local:west:power-actual
  # Energy value prediction:
  Solar_Forecast_Energy_Today:
    type: Number
    dimension: Energy
    label: Todays Energy Forecast
    icon: solarplant
    format: '%.2f %unit%'
    unit: kWh
    groups:
      - gSolar_Forecast
    tags:
      - Forecast
      - Energy
    channel: solarforecast:fs-site:local:energy-today
